name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate App Icons
        run: |
          ICON_DIR="App/Assets.xcassets/AppIcon.appiconset"
          SRC="$ICON_DIR/AppIcon.png"

          mkdir -p "$ICON_DIR"

          sips -z 40 40 "$SRC" --out "$ICON_DIR/Icon-20@2x.png"
          sips -z 60 60 "$SRC" --out "$ICON_DIR/Icon-20@3x.png"
          sips -z 58 58 "$SRC" --out "$ICON_DIR/Icon-29@2x.png"
          sips -z 87 87 "$SRC" --out "$ICON_DIR/Icon-29@3x.png"
          sips -z 80 80 "$SRC" --out "$ICON_DIR/Icon-40@2x.png"
          sips -z 120 120 "$SRC" --out "$ICON_DIR/Icon-40@3x.png"
          sips -z 120 120 "$SRC" --out "$ICON_DIR/Icon-60@2x.png"
          sips -z 180 180 "$SRC" --out "$ICON_DIR/Icon-60@3x.png"
          sips -z 1024 1024 "$SRC" --out "$ICON_DIR/Icon-1024.png"

          cat > "$ICON_DIR/Contents.json" <<'EOF'
          {
            "images" : [
              { "idiom" : "iphone", "size" : "20x20", "scale" : "2x", "filename" : "Icon-20@2x.png" },
              { "idiom" : "iphone", "size" : "20x20", "scale" : "3x", "filename" : "Icon-20@3x.png" },
              { "idiom" : "iphone", "size" : "29x29", "scale" : "2x", "filename" : "Icon-29@2x.png" },
              { "idiom" : "iphone", "size" : "29x29", "scale" : "3x", "filename" : "Icon-29@3x.png" },
              { "idiom" : "iphone", "size" : "40x40", "scale" : "2x", "filename" : "Icon-40@2x.png" },
              { "idiom" : "iphone", "size" : "40x40", "scale" : "3x", "filename" : "Icon-40@3x.png" },
              { "idiom" : "iphone", "size" : "60x60", "scale" : "2x", "filename" : "Icon-60@2x.png" },
              { "idiom" : "iphone", "size" : "60x60", "scale" : "3x", "filename" : "Icon-60@3x.png" },
              { "idiom" : "ios-marketing", "size" : "1024x1024", "scale" : "1x", "filename" : "Icon-1024.png" }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project IPAID.xcodeproj \
            -scheme IPAID \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/IPAID.app Payload/
          zip -vr IPAID.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPAID
          path: IPAID.ipa
