name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate App Icons
        run: |
          ICON_DIR="App/Assets.xcassets/AppIcon.appiconset"
          SRC="$ICON_DIR/AppIconSource.png"

          rm -f "$ICON_DIR"/Icon-*.png

          sips -z 40 40 "$SRC" --out "$ICON_DIR/Icon-20@2x.png"
          sips -z 60 60 "$SRC" --out "$ICON_DIR/Icon-20@3x.png"
          sips -z 58 58 "$SRC" --out "$ICON_DIR/Icon-29@2x.png"
          sips -z 87 87 "$SRC" --out "$ICON_DIR/Icon-29@3x.png"
          sips -z 80 80 "$SRC" --out "$ICON_DIR/Icon-40@2x.png"
          sips -z 120 120 "$SRC" --out "$ICON_DIR/Icon-40@3x.png"
          sips -z 120 120 "$SRC" --out "$ICON_DIR/Icon-60@2x.png"
          sips -z 180 180 "$SRC" --out "$ICON_DIR/Icon-60@3x.png"
          sips -z 1024 1024 "$SRC" --out "$ICON_DIR/Icon-1024.png"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project IPAID.xcodeproj \
            -scheme IPAID \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          rm -rf Payload IPAID.ipa
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/IPAID.app Payload/
          zip -qry IPAID.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: IPAID
          path: IPAID.ipa
          retention-days: 7
