name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project IPAID.xcodeproj \
            -scheme IPAID \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload

          cp -r \
          build/Build/Products/Release-iphoneos/IPAID.app \
          Payload/

          zip -vr IPAID.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPAID
          path: IPAID.ipa
          retention-days: 7
