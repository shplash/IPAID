name: IPAID

options:
  bundleIdPrefix: com.shplash
  deploymentTarget:
    iOS: "15.0"

targets:
  IPAID:
    type: application
    platform: iOS
    deploymentTarget: "15.0"

    sources:
      - App

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.shplash.ipaid
      PRODUCT_NAME: IPAID
      INFOPLIST_FILE: App/Info.plist
      SWIFT_VERSION: 5.0
      CURRENT_PROJECT_VERSION: 11
      MARKETING_VERSION: 1.1

    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

    scheme:
      gatherCoverageData: false
      testTargets: []

    postBuildScripts:
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -r "${BUILT_PRODUCTS_DIR}/IPAID.app" Payload/
          zip -r IPAID.ipa Payload